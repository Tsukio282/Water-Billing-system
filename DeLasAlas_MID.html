<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Las Alas water bill</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 100%);
            margin: 40px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(233,30,99,0.1);
            margin: auto;
            border: 2px solid #e1bee7;
        }
        h2 {
            text-align: center;
            color: #0d47a1;
            margin-bottom: 25px;
        }
        .discount-note {
            background-color: #fce4ec;
            border-left: 4px solid #e91e63;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }
        .discount-note ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #1565c0;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ce93d8;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #e91e63;
            box-shadow: 0 0 5px rgba(233,30,99,0.3);
        }
        button {
            background-color: #1565c0;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #e91e63;
            transform: translateY(-2px);
        }
        .output {
            margin-top: 25px;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 4px;
            display: none;
            border: 1px dashed #1565c0;
        }
        .output h3 {
            color: #0d47a1;
            margin-top: 0;
        }
        .output hr {
            border: 0;
            border-top: 1px solid #1565c0;
            margin: 15px 0;
        }
        .counter {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
            background: #f3e5f5;
            padding: 10px;
            border-radius: 4px;
        }
        #txCount {
            font-weight: bold;
            color: #e91e63;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> De Las Alas Water Billing Statement</h2>
    
    <div class="discount-note">
        <strong>Discount List:</strong>
        <ul>
            <li>Senior Citizen = 25%</li>
            <li>Solo Parent = 15%</li>
        </ul>
    </div>
    
    <div class="form-group">
        <label for="customerName">Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter name">
    </div>
    
    <div class="form-group">
        <label for="consumption">Water Consumption (Cubic Meters)</label>
        <input type="number" id="consumption" placeholder="Enter consumption" min="0">
    </div>
    
    <div class="form-group">
        <label for="customerType">Customer Type</label>
        <select id="customerType">
            <option value="Regular">Regular</option>
            <option value="Senior Citizen">Senior Citizen</option>
            <option value="Solo Parent">Solo Parent</option>
        </select>
    </div>
    
    <button onclick="generateBill()">Generate Bill</button>
    <button onclick="resetBtn()">Reset Button</button>

    <div class="counter">
        Transactions Processed: <span id="txCount">0</span>
    </div>

    <div class="output" id="billOutput">
        </div>
</div>

<script>
    let transactionCount = 0;
    
    // The live Web App URL is inserted here
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVzNY1IjvldG3Dm1mBH1XiZm23n-TgXKR8QzX4yk-m9LTzNPlioOcPzO80WzoLsUMOCQ/exec";

    function generateBill() {
        const name = document.getElementById("customerName").value;
        const consumption = parseFloat(document.getElementById("consumption").value);
        const type = document.getElementById("customerType").value;
        
        if (!name || isNaN(consumption) || consumption < 0) {
            alert("Please enter a valid name and positive water consumption.");
            return;
        }
        
        let baseAmount = 0;
        let remaining = consumption;
        
        if (remaining > 60) {
            baseAmount += (remaining - 60) * 60;
            remaining = 60;
        }
        if (remaining > 40) {
            baseAmount += (remaining - 40) * 45;
            remaining = 40;
        }
        if (remaining > 20) {
            baseAmount += (remaining - 20) * 35;
            remaining = 20;
        }
        if (remaining > 0) {
            baseAmount += remaining * 25;
        }

        // Apply Discounts using switch statement
        let discountRate = 0;
        switch(type) {
            case "Senior Citizen":
                discountRate = 0.25;
                break;
            case "Solo Parent":
                discountRate = 0.15;
                break;
            default:
                discountRate = 0;
        }
        
        const discountAmount = baseAmount * discountRate;
        const totalAmount = baseAmount - discountAmount;
        
        transactionCount++;
        document.getElementById("txCount").innerText = transactionCount;
        
        const outputDiv = document.getElementById("billOutput");
        outputDiv.style.display = "block";
        outputDiv.innerHTML = `
            <h3>Billing Summary</h3>
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Consumption:</strong> ${consumption} cubic meters</p>
            <p><strong>Type:</strong> ${type}</p>
            <p><strong>Base Charge:</strong> ₱${baseAmount.toFixed(2)}</p>
            <p><strong>Discount Applied:</strong> ₱${discountAmount.toFixed(2)}</p>
            <hr>
            <h4><strong>Total Bill:</strong> ₱${totalAmount.toFixed(2)}</h4>
        `;
        
        recordTransaction(name, consumption, type, totalAmount);
    }

    function recordTransaction(name, consumption, type, total) {
        const data = {
            timestamp: new Date().toLocaleString(),
            name: name,
            consumption: consumption,
            type: type,
            total: total
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        }).then(() => {
            console.log("Transaction sent to Google Sheets.");
        }).catch(error => {
            console.error("Error recording transaction:", error);
        });
    }

</script>

</body>
</html>
